# Resource Pack Variables
#
# Variables define reusable color and opacity values that can be referenced
# from overrides.toml using the template syntax:
#
#   color="${color.<name>}"
#   opacity="${opacity.<name>}"
#
# Colors are hex values in 0xRRGGBB format (e.g. 0xff0000 = red).
# Opacity is a number from 0 (opaque) to 255 (transparent).
#
# You can also add your own variables here and reference them in overrides.toml.
# ex.
# vars.toml:
# 	some-name: 0xff
#
# overrides.toml:
#	bank.menu.border.inner.color="${some-name}"
#
# Variables can also reference other variables, so ex. you can define a theme
# section that groups related values:
#
#   [theme.my-theme1]
#   background=0x000000
#   text=0xffffff
#
#   [color]
#   dark="${theme.my-theme1.background}"
#   light="${theme.my-theme1.text}"
#
# See the sample development pack for an example of usage: https://github.com/melkypie/resource-packs/tree/pack-development
# It is not available in the client but it can be downloaded for local usage.
#
# The comments above each value in the default vars are where each value is possibly used,
# so you can have an idea of where to look in-game for changes. The comment lines can be deleted
# if you so choose, as they do not provide any functionality to the pack.

