# This is a basic workflow to help you get started with Actions

name: Check Pack

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR to run against'
        required: true
        default: ''
      sha:
        description: 'SHA to checkout'
        required: true
        default: ''
      ref:
        description: 'Name of pack to push'
        required: true
        default: ''

run-name: ${{ inputs.pr }}-${{ inputs.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      errors: ${{ steps.check-files.outputs.contents }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Checkout pack
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          path: pack

      - name: Download the latest vanilla sprites
        uses: dsaltares/fetch-gh-release-asset@1.1.0
        with:
          repo: 'melkypie/sprite-exporter'
          file: '.*-sprites\.zip'
          regex: true
          target: "./"

      - name: Extract latest vanilla sprites
        run: unzip -jq *-sprites.zip -d sprites/

      - name: Download validation tool
        uses: dsaltares/fetch-gh-release-asset@1.1.0
        with:
          repo: 'raiyni/resource-packs-tools'
          file: 'validation-v.*\.jar'
          regex: true
          target: "./"

      - name: Check pack for errors
        run: java -DspriteFolder="sprites" -DpackFolder="pack" -cp validation-v*.jar melky.resourcepacks.validation.PackCheck

      - name: Read errors
        id: check-files
        if: always()
        run: |
          ./scripts/errors.sh
          ./scripts/warnings.sh

